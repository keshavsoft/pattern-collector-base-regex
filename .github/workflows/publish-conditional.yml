name: NPM Check, Publish and Notify

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      was_published: ${{ steps.publish-step.outputs.was_published }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Publish to npm
        id: publish-step
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          BEFORE_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "None")
          
          echo "### 🚀 NPM Publication Summary" >> $GITHUB_STEP_SUMMARY
          echo "* **Package**: \`$PACKAGE_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "* **Git Repository**: <a href=\"https://github.com/${{ github.repository }}\" target=\"_blank\">https://github.com/${{ github.repository }}</a>" >> $GITHUB_STEP_SUMMARY
          echo "* **Before Publish Version**: \`$BEFORE_VERSION\`" >> $GITHUB_STEP_SUMMARY
          
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "Version ${PACKAGE_VERSION} of ${PACKAGE_NAME} is already published on npm. Skipping publish."
            echo "* **After Publish Version**: \`$BEFORE_VERSION\`" >> $GITHUB_STEP_SUMMARY
            echo "* **Status**: ⚠️ Skipped (Version $PACKAGE_VERSION is already published on NPM)" >> $GITHUB_STEP_SUMMARY
            echo "was_published=false" >> $GITHUB_OUTPUT
          else
            npm publish
            echo "* **After Publish Version**: \`$PACKAGE_VERSION\`" >> $GITHUB_STEP_SUMMARY
            echo "* **Status**: ✅ Successfully Published to NPM" >> $GITHUB_STEP_SUMMARY
            echo "was_published=true" >> $GITHUB_OUTPUT
          fi
          echo "* **Registry Link**: <a href=\"https://www.npmjs.com/package/$PACKAGE_NAME\" target=\"_blank\">https://www.npmjs.com/package/$PACKAGE_NAME</a>" >> $GITHUB_STEP_SUMMARY
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify-dependents:
    needs: publish
    if: needs.publish.outputs.was_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Notify dependents
        run: |
          echo "### 🔔 Dependency Notification Status" >> $GITHUB_STEP_SUMMARY
          RESPONSE1=$(curl -s -w "%{http_code}" -o resp1.json -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/keshavsoft/pattern-collector-routesjs-import-extract/dispatches \
            -d '{"event_type":"dependency-updated"}')
          if [ "$RESPONSE1" = "204" ]; then
            echo "* **<a href=\"https://github.com/keshavsoft/pattern-collector-routesjs-import-extract\" target=\"_blank\">pattern-collector-routesjs-import-extract</a>**: ✅ Dispatched successfully (HTTP 204)" >> $GITHUB_STEP_SUMMARY
          else
            echo "* **<a href=\"https://github.com/keshavsoft/pattern-collector-routesjs-import-extract\" target=\"_blank\">pattern-collector-routesjs-import-extract</a>**: ❌ Failed to dispatch (HTTP $RESPONSE1)" >> $GITHUB_STEP_SUMMARY
            cat resp1.json >> $GITHUB_STEP_SUMMARY
          fi
          RESPONSE2=$(curl -s -w "%{http_code}" -o resp2.json -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/keshavsoft/express-fix-any-js-from-for-import/dispatches \
            -d '{"event_type":"dependency-updated"}')
          if [ "$RESPONSE2" = "204" ]; then
            echo "* **<a href=\"https://github.com/keshavsoft/express-fix-any-js-from-for-import\" target=\"_blank\">express-fix-any-js-from-for-import</a>**: ✅ Dispatched successfully (HTTP 204)" >> $GITHUB_STEP_SUMMARY
          else
            echo "* **<a href=\"https://github.com/keshavsoft/express-fix-any-js-from-for-import\" target=\"_blank\">express-fix-any-js-from-for-import</a>**: ❌ Failed to dispatch (HTTP $RESPONSE2)" >> $GITHUB_STEP_SUMMARY
            cat resp2.json >> $GITHUB_STEP_SUMMARY
          fi
          RESPONSE3=$(curl -s -w "%{http_code}" -o resp3.json -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/keshavsoft/express-fix-any-js-from-for-consumption/dispatches \
            -d '{"event_type":"dependency-updated"}')
          if [ "$RESPONSE3" = "204" ]; then
            echo "* **<a href=\"https://github.com/keshavsoft/express-fix-any-js-from-for-consumption\" target=\"_blank\">express-fix-any-js-from-for-consumption</a>**: ✅ Dispatched successfully (HTTP 204)" >> $GITHUB_STEP_SUMMARY
          else
            echo "* **<a href=\"https://github.com/keshavsoft/express-fix-any-js-from-for-consumption\" target=\"_blank\">express-fix-any-js-from-for-consumption</a>**: ❌ Failed to dispatch (HTTP $RESPONSE3)" >> $GITHUB_STEP_SUMMARY
            cat resp3.json >> $GITHUB_STEP_SUMMARY
          fi
